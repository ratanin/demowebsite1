<!DOCTYPE html>
<html>
<head>
    <title>Add Sushi 🍣</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #f8f9fa, #eef2f3);
        }

        .card {
            border-radius: 15px;
        }

        .preview-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <div class="card shadow p-4 col-md-6 mx-auto">
        <h2 class="text-center mb-4">➕ Add New Sushi 🍣</h2>

        <form method="POST">

            <div class="mb-3">
                <label class="form-label">ชื่อ</label>
                <input name="name" class="form-control" placeholder="เช่น Salmon Nigiri" required>
            </div>

            <div class="mb-3">
                <label class="form-label">ราคา</label>
                <input name="price" type="number" class="form-control" placeholder="เช่น 120" required>
            </div>

            <div class="mb-3">
                <label class="form-label">จำนวน</label>
                <input name="stock" type="number" class="form-control" placeholder="เช่น 10" required>
            </div>

            <div class="mb-3">
                <label class="form-label">หมวดหมู่</label>
                <select name="category_id" class="form-control" required>
                    {% for c in categories %}
                        <option value="{{ c[0] }}">{{ c[1] }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">รูป (URL)</label>
                <input id="imgInput" name="image" class="form-control" placeholder="วางลิงก์รูปที่นี่" required>
                
                <img id="preview" class="preview-img"
                     src="https://via.placeholder.com/300x200?text=Preview"
                     onerror="this.src='https://via.placeholder.com/300x200?text=No+Image';">
            </div>

            <div class="d-flex justify-content-between">
                <a href="/" class="btn btn-secondary">⬅ กลับ</a>
                <button class="btn btn-success">💾 บันทึก</button>
            </div>

        </form>
    </div>

</div>

<script>
    document.getElementById("imgInput").addEventListener("input", function() {
        document.getElementById("preview").src = this.value;
    });
</script>

</body>
</html>
