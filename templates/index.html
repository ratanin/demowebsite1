<!DOCTYPE html>
<html>
<head>
    <title>Sushi Shop 🍣</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #f8f9fa, #eef2f3);
        }

        .navbar {
            background-color: #111;
        }

        .navbar-brand {
            color: #fff;
            font-weight: bold;
            font-size: 24px;
        }

        .hero {
            background: url('https://images.unsplash.com/photo-1546069901-ba9599a7e63c') center/cover;
            height: 250px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            margin-bottom: 30px;
        }

        .hero h1 {
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 10px;
        }

        .card {
            border-radius: 15px;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card-img-top {
            border-top-left-radius: 15px;
            border-top-right-radius: 15px;
        }

        .badge-category {
            background: #dc3545;
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            color: gray;
        }
    </style>
</head>

<body>

<!-- 🔥 Navbar -->
<nav class="navbar navbar-dark px-4">
    <span class="navbar-brand">🍣 Sushi Shop</span>
</nav>

<div class="container mt-4">

    <!-- 🎌 Hero -->
    <div class="hero">
        <h1>Fresh Sushi Everyday</h1>
    </div>

    <!-- 🔍 Add button -->
    <div class="d-flex justify-content-between mb-3">
        <h3>Menu</h3>
        <a href="/add" class="btn btn-primary">+ Add Sushi</a>
    </div>

    <!-- 🍣 Sushi Grid -->
    <div class="row">
        {% for s in sushi %}
        <div class="col-md-4">
            <div class="card shadow mb-4">

                <img src="{{ s[5] }}"
                     class="card-img-top"
                     style="height:200px; object-fit:cover;"
                     onerror="this.src='https://via.placeholder.com/300x200?text=No+Image';">

                <div class="card-body">

                    <h5 class="card-title">{{ s[1] }}</h5>

                    <span class="badge badge-category">{{ s[4] }}</span>

                    <p class="mt-2 mb-2">
                        💰 {{ s[2] }} บาท<br>
                        📦 เหลือ {{ s[3] }} ชิ้น
                    </p>

                    <div class="d-flex justify-content-between">
                        <a href="/edit/{{ s[0] }}" class="btn btn-warning btn-sm">แก้ไข</a>

                        <a href="/delete/{{ s[0] }}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('ลบเมนูนี้จริงไหม?')">
                           ลบ
                        </a>
                    </div>

                </div>

            </div>
        </div>
        {% endfor %}
    </div>

</div>

<!-- 🔻 Footer -->
<div class="footer">
    © 2026 Sushi Shop | Made with ❤️
</div>

</body>
</html>
